syntax = "proto3";

package p2p.proto;

option go_package = "solana_golang/p2p/proto;p2pproto";

enum MessageFlag {
  MESSAGE_FLAG_UNKNOWN = 0;
  MESSAGE_FLAG_NOTIFY = 1;
  MESSAGE_FLAG_REQUEST = 2;
  MESSAGE_FLAG_RESPONSE = 3;
}

message P2PMessage {
  uint32 version = 1;
  string id = 2;
  uint32 type = 3;
  string from_peer_id = 4;
  string to_peer_id = 5;
  string request_id = 6;
  MessageFlag flag = 7;
  bytes payload = 8;
  int64 created_at_unix_milli = 9;
}
